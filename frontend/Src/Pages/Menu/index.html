<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Cadastro</title>
    <link rel="stylesheet" href="/frontend/Src/Public/Css/menu.css">
</head>
<body>
    <div class="content">
        <div class="form-container">
            <h2>Cadastro</h2>
            <form>
                <div class="input-group">
                    <div class="input-box">
                        <label for="name">Nome</label>
                        <input type="text" id="name" name="name" placeholder="Nome">
                    </div>
                    <div class="input-box">
                        <label for="username">Usuário</label>
                        <input type="text" id="username" name="username" placeholder="Usuário">
                    </div>
                    <button type="submit" class="btn">Cadastrar</button>
                </div>
            </form>
        </div>
        
        
        <h3>Usuários</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Função</th>
                        <th>Usuário</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Henry Magalhães</td>
                        <td>Biomédico</td>
                        <td>henry.afmagalhaes</td>
                        <td><button class="btn-actions">...</button></td>
                    </tr>
                    <tr>
                        <td>Matheus Moura</td>
                        <td>Biomédico</td>
                        <td>matheus.moura</td>
                        <td><button class="btn-actions">...</button></td>
                    </tr>
                    <tr>
                        <td>Lauro Liberato</td>
                        <td>Biomédico</td>
                        <td>lauro.lneto</td>
                        <td><button class="btn-actions">...</button></td>
                    </tr>
                    <tr>
                        <td>Henrique Duquinha</td>
                        <td>Biomédico</td>
                        <td>henrique.fduquinha</td>
                        <td><button class="btn-actions">...</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
